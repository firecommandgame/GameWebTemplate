<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Media | Hotel Games</title>

    <link rel="stylesheet" href="cms.css">

    <style>
        #posts {
            display: block !important;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        #posts .card {
            display: block;
            width: 100%;
            margin-bottom: 60px;
            overflow: hidden;
            background: #111;
            border-left: 4px solid #e50914;
            border-radius: 18px;
        }

        #posts .card img {
            display: block !important;
            width: 100% !important;
            height: auto !important;
            max-height: none !important;
            object-fit: contain !important;
        }

        #posts .content {
            padding: 36px;
        }
    </style>
</head>

<body>

<header>
    <img src="hotelgamessticker.png" alt="Hotel Games">

    <nav>
        <a href="index.html">Home</a>
        <a href="admin.html">Admin</a>
        <a href="news.html">News</a>
        <a href="media.html">Media</a>
        <a href="community.html">Community</a>
    </nav>
</header>

<div class="hero">
    <h1>Media <span>Updates</span></h1>
</div>

<section>
    <div id="posts">
        <p>Loading posts...</p>
    </div>
</section>

<footer>
    <div class="footer-red"></div>
    <div class="footer-main">
        © 2026 Hotel Games Studios. All Rights Reserved.
    </div>
</footer>

<script type="module">
    import "./cms.js";

    window.addEventListener("load", () => {
        if (typeof window.loadPosts === "function") {
            window.loadPosts("media");
        } else {
            console.error("loadPosts was not loaded from cms.js");
        }
    });
</script>

</body>
</html>
