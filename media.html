<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Media | Hotel Games</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="cms.css">
<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
:root{--black:#030303;--red:#e50914;--red2:#8b0000;--muted:#aaa}
html{scroll-behavior:smooth}
body{background:var(--black);color:#fff;overflow-x:hidden}
a{text-decoration:none;color:inherit}
header{position:fixed;top:0;left:0;width:100%;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.88);border-bottom:1px solid rgba(229,9,20,.35);backdrop-filter:blur(12px);z-index:99}
header img{height:88px;width:auto;display:block}
.nav{display:flex;gap:20px;flex-wrap:wrap;justify-content:flex-end}
.nav a{color:#ddd;text-transform:uppercase;font-weight:700;font-size:13px}
.nav a:hover{color:var(--red)}
.hero{min-height:92vh;padding:170px 7% 100px;display:grid;grid-template-columns:1fr .9fr;gap:50px;align-items:center;background:radial-gradient(circle at 15% 20%,rgba(229,9,20,.35),transparent 25%),radial-gradient(circle at 85% 65%,rgba(139,0,0,.28),transparent 28%),linear-gradient(120deg,#030303,#130000)}
.hero h1{font-size:clamp(52px,8vw,100px);line-height:.9;text-transform:uppercase;letter-spacing:-4px}
.hero h1 span,.title span{color:var(--red);text-shadow:0 0 35px rgba(229,9,20,.4)}
.hero p{margin-top:25px;max-width:820px;color:#d0d0d0;font-size:22px;line-height:1.7}
.btn{display:inline-block;margin-top:30px;padding:15px 26px;background:linear-gradient(135deg,var(--red),var(--red2));font-weight:900;text-transform:uppercase;border-radius:4px}
.hero-panel{background:#070707;border:1px solid rgba(229,9,20,.35);border-radius:28px;padding:30px;box-shadow:0 35px 90px rgba(0,0,0,.7),0 0 55px rgba(229,9,20,.18)}
.hero-art{height:420px;border-radius:20px;overflow:hidden}
section{padding:85px 7%}
.title{font-size:clamp(42px,5vw,70px);text-transform:uppercase;margin-bottom:25px;letter-spacing:-2px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.card{background:#111;border-left:4px solid var(--red);border-radius:18px;overflow:hidden;border-top:1px solid rgba(255,255,255,.08)}
.card-img{height:210px;overflow:hidden}
.content{padding:26px}
.content h3{text-transform:uppercase;margin-bottom:10px}
.content p{color:#aaa;line-height:1.7}
.tags{display:flex;gap:12px;flex-wrap:wrap;margin:25px 0}
.tags span{border:1px solid rgba(229,9,20,.4);color:#ffb3b7;padding:9px 13px;border-radius:20px;text-transform:uppercase;font-size:12px;font-weight:bold}
.systems{background:#070707}
.system-card{background:#101010;padding:28px;border-radius:18px;border:1px solid rgba(255,255,255,.08);border-bottom:4px solid var(--red)}
.system-card i{color:var(--red);font-size:34px;margin-bottom:14px}
.system-card h3{text-transform:uppercase;margin-bottom:10px}
.system-card p{color:#aaa;line-height:1.7}

/* Correct footer classes */
footer{background:#050505;color:#fff;margin-top:60px;border-top:1px solid rgba(229,9,20,.35)}
.footer-top{height:10px;background:linear-gradient(90deg,#8b0000,#e50914,#8b0000)}
.footer-main{padding:50px 7%;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:30px}
.footer-brand{display:flex;flex-direction:column;align-items:flex-start;flex:0 0 auto}
.footer-brand a{display:inline-block}
.footer-brand img{width:140px!important;height:auto!important;max-width:140px!important;display:block!important;object-fit:contain!important;margin-bottom:12px}
.footer-brand p{color:#999;line-height:1.6;max-width:340px;font-size:14px}
.footer-links{display:flex;gap:22px;flex-wrap:wrap;max-width:620px;align-items:center}
.footer-links a{color:#ccc;font-size:13px;font-weight:800;text-transform:uppercase}
.footer-links a:hover{color:var(--red)}
footer .social{margin:0;display:flex;gap:18px;align-items:center}
footer .social a{display:inline-flex;align-items:center;justify-content:center;width:auto;height:auto;background:transparent;border:0}
footer .social a i{font-size:28px;color:#fff;padding:0}
footer .social a:hover i{color:var(--red)}
.footer-bottom{background:#eee;color:#111;padding:24px 7%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;font-weight:700}
.footer-bottom a{color:#111;margin-right:20px;font-weight:700}
.footer-bottom a:hover{color:var(--red)}
@media(max-width:950px){
header{position:static;flex-direction:column;gap:16px}
.nav{justify-content:center}
.hero{grid-template-columns:1fr}
.hero-art{height:300px}
.hero h1{letter-spacing:-2px}
.footer-main,.footer-bottom{flex-direction:column;text-align:center;align-items:center}
.footer-brand{align-items:center}
}


/* Media page content only — header/footer remain identical to Games */
.media-hero{
  min-height:72vh;
  padding:170px 7% 90px;
  display:flex;
  align-items:center;
  background:
    radial-gradient(circle at 15% 20%,rgba(229,9,20,.35),transparent 25%),
    radial-gradient(circle at 85% 65%,rgba(139,0,0,.28),transparent 28%),
    linear-gradient(120deg,#030303,#130000);
}
.media-hero h1{
  font-size:clamp(52px,8vw,100px);
  line-height:.9;
  text-transform:uppercase;
  letter-spacing:-4px;
}
.media-hero h1 span{color:var(--red);text-shadow:0 0 35px rgba(229,9,20,.4)}
.media-section{padding:85px 7%}
#posts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
}
#posts .card,
#posts article,
#posts > div{
  background:#111;
  border-left:4px solid var(--red);
  border-radius:18px;
  overflow:hidden;
  border-top:1px solid rgba(255,255,255,.08);
}
#posts img{
  width:100%;
  height:210px;
  object-fit:cover;
  display:block;
}
#posts h1,#posts h2,#posts h3,#posts h4{
  text-transform:uppercase;
  margin:0 0 10px;
}
#posts p{color:#aaa;line-height:1.7}
#posts .content,
#posts article > div,
#posts > div > div{
  padding:26px;
}
@media(max-width:950px){
  .media-hero h1{letter-spacing:-2px}
}

</style>
</head>
