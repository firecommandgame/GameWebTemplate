<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Media | Hotel Games</title>

    <link rel="stylesheet" href="cms.css">

    <style>
        #posts {
            display: block !important;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        #posts .news-article {
            display: block;
            width: 100%;
            margin-bottom: 60px;
            padding: 0;
            overflow: hidden;
            background: #111;
            border-left: 4px solid #e50914;
            border-radius: 18px;
        }

        #posts .hero-image {
            display: block !important;
            width: 100% !important;
            height: auto !important;
            max-height: none !important;
            margin: 0 !important;
            border-radius: 0 !important;
            object-fit: contain !important;
            background: #050505;
        }

        #posts .article-content {
            padding: 36px;
        }

        #posts .article-content h1 {
            margin: 0 0 18px;
            color: #fff;
            font-size: clamp(30px, 4vw, 48px);
            line-height: 1.1;
            text-transform: uppercase;
        }

        #posts .article-content p {
            color: #c7c7c7;
            font-size: 18px;
            line-height: 1.8;
        }

        #posts .article-content .small {
            margin: 0 0 18px;
            color: #888;
            font-size: 13px;
        }

        @media (max-width: 700px) {
            #posts .article-content {
                padding: 22px;
            }

            #posts .article-content p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body onload="loadPosts('media')">

<header>
    <a href="index.html">
        <img src="hotelgamessticker.png" alt="Hotel Games">
    </a>

    <nav>
        <a href="index.html">Home</a>
        <a href="admin.html">Admin</a>
        <a href="news.html">News</a>
        <a href="media.html">Media</a>
        <a href="community.html">Community</a>
    </nav>
</header>

<div class="hero">
    <h1>Media <span>Updates</span></h1>
</div>

<section>
    <div id="posts">
        <p class="small">Loading posts...</p>
    </div>
</section>

<footer>
    <div class="footer-red"></div>

    <div class="footer-main">
        © 2026 Hotel Games Studios. All Rights Reserved.
    </div>
</footer>

<script type="module" src="./cms.js"></script>

</body>
</html>
