<style id="hotel-games-consistent-support-header-footer">
/* Consistent Hotel Games header/footer copied from Support page */
body{background:#030303;color:#fff}
a{text-decoration:none;color:inherit}
header{
  position:fixed!important;
  top:0!important;
  left:0!important;
  width:100%!important;
  padding:18px 7%!important;
  display:flex!important;
  justify-content:space-between!important;
  align-items:center!important;
  background:rgba(0,0,0,.88)!important;
  border-bottom:1px solid rgba(229,9,20,.35)!important;
  backdrop-filter:blur(12px)!important;
  z-index:9999!important;
}
header img{height:120px!important;width:auto!important;display:block!important}
nav{
  display:flex!important;
  gap:20px!important;
  flex-wrap:wrap!important;
  justify-content:flex-end!important;
}
nav a{
  color:#ddd!important;
  text-decoration:none!important;
  text-transform:uppercase!important;
  font-weight:700!important;
  font-size:13px!important;
  letter-spacing:0!important;
}
nav a:hover{color:#e50914!important}
footer{
  background:#050505!important;
  margin-top:60px!important;
  border-top:1px solid rgba(229,9,20,.35)!important;
  color:#fff!important;
}
.bar{
  height:10px!important;
  background:linear-gradient(90deg,#8b0000,#e50914,#8b0000)!important;
}
.foot{
  padding:50px 7%!important;
  display:flex!important;
  justify-content:space-between!important;
  flex-wrap:wrap!important;
  gap:20px!important;
  align-items:flex-start!important;
}
.foot img{height:120px!important;width:auto!important;display:block!important}
.footer-links{
  display:flex!important;
  gap:22px!important;
  flex-wrap:wrap!important;
  align-items:center!important;
}
.footer-links a{
  color:#ccc!important;
  text-decoration:none!important;
  font-weight:800!important;
  text-transform:uppercase!important;
  font-size:13px!important;
}
.footer-links a:hover{color:#e50914!important}
.copy{
  background:#eee!important;
  color:#111!important;
  padding:24px 7%!important;
  font-weight:700!important;
}
@media(max-width:900px){
  header{position:static!important;flex-direction:column!important;gap:16px!important}
  nav{justify-content:center!important}
}
</style>
</head>
